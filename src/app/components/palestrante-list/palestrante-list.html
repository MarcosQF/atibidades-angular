<section>
  <h2>Palestrantes</h2>

  <div class="filter-container">
    <input
      [(ngModel)]="termoBusca"
      placeholder="Filtrar por empresa..."
      (keyup.enter)="filtrarPorEmpresa()"
    />

    <button (click)="filtrarPorEmpresa()">Buscar</button>
    <button (click)="termoBusca.set(''); carregarPalestrantes()">Limpar</button>
  </div>

  @if (loading()) {
    <p>Carregando palestrantes...</p>
  } @else {
    <div class="lista-palestrantes">
      @for (palestrante of palestrantes(); track palestrante.id) {
        <div class="card">
          <h3>{{ palestrante.nome }}</h3>
          <p>{{ palestrante.cargo }} - {{ palestrante.empresa }}</p>
          <p><strong>Tema:</strong> {{ palestrante.temaPalestra }}</p>
        </div>
      } @empty {
        <p>Nenhum palestrante encontrado.</p>
      }
    </div>
  }
</section>
